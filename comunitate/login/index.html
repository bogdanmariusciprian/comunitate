<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Autentificare — Atelierul-LRO</title>
  <meta name="description" content="Conectează-te la Atelierul-LRO: comunitatea de învățare a limbii și literaturii române." />
  <link rel="stylesheet" href="../../src/shared/styles/main.css" />
</head>
<body>
  <div id="header"></div>

  <main class="container">
    <section class="page-hero">
      <h1>Autentificare</h1>
      <p>Conectează-te pentru a participa în comunitate: postezi, comentezi, câștigi puncte și streak.</p>
      <div id="google-btn" class="google-btn"></div>
      <button id="google-fallback" class="btn btn--primary" hidden>Continuă cu Google</button>
      <p id="login-note" class="login-note">Conectează-te cu contul tău Google.</p>
    </section>
  </main>

  <div id="footer"></div>

  <script type="module">
    import { renderChrome } from "../../src/shared/components/site-chrome.js";
    import { supabase } from "../../src/shared/scripts/supabase-client.js";
    import { signInWithGoogle } from "../../src/shared/scripts/auth.js";
    import { mountGoogleSignIn } from "../../src/shared/scripts/google-onetap.js";
    renderChrome("../../");

    // Already signed in? Straight to the community hub. Also fires right
    // after a successful One Tap / Google sign-in, so login feels seamless.
    const goToHub = () => window.location.replace("../#forum");
    supabase.auth.onAuthStateChange((_event, session) => {
      if (session?.user) goToHub();
    });

    const {
      data: { session },
    } = await supabase.auth.getSession();
    if (session?.user) {
      goToHub();
    } else {
      // In-page Google login (official button + One Tap card). If Google's
      // script can't load (adblock / offline), fall back to the classic
      // redirect button so login always works.
      mountGoogleSignIn(document.getElementById("google-btn"), {
        oneTap: true,
        onError: () => {
          document.getElementById("google-btn").hidden = true;
          const fb = document.getElementById("google-fallback");
          fb.hidden = false;
          fb.addEventListener("click", () => signInWithGoogle());
        },
      });
    }
  </script>
</body>
</html>
